<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TCS Financial Assistant</title>
<style>
  :root { --bg:#0f1115; --panel:#1a1d24; --accent:#4f8cff; --text:#e8e9ec; --muted:#8b909c; --user:#2b3140; --bot:#1f2530; --border:#2a2e38; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
  header { padding:16px 24px; border-bottom:1px solid var(--border); }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header p { margin:4px 0 0; font-size:13px; color:var(--muted); }
  #chat { flex:1; overflow-y:auto; padding:20px; max-width:760px; margin:0 auto; width:100%; }
  .msg { margin-bottom:18px; display:flex; }
  .msg.user { justify-content:flex-end; }
  .bubble { max-width:75%; padding:12px 16px; border-radius:14px; line-height:1.5; font-size:14.5px; white-space:pre-wrap; }
  .user .bubble { background:var(--accent); color:white; border-bottom-right-radius:4px; }
  .bot .bubble { background:var(--bot); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .meta { font-size:11.5px; color:var(--muted); margin-top:6px; }
  .sources { margin-top:8px; font-size:12px; color:var(--muted); }
  .sources ul { margin:4px 0 0 0; padding-left:18px; }
  .blocked .bubble { border-color:#7a4a2a; background:#2a2118; }
  #inputbar { border-top:1px solid var(--border); padding:16px 24px; }
  #inputform { max-width:760px; margin:0 auto; display:flex; gap:10px; }
  #q { flex:1; padding:12px 14px; border-radius:10px; border:1px solid var(--border); background:var(--panel); color:var(--text); font-size:14px; }
  #q:focus { outline:none; border-color:var(--accent); }
  button { padding:12px 20px; border-radius:10px; border:none; background:var(--accent); color:white; font-size:14px; cursor:pointer; }
  button:disabled { opacity:0.5; cursor:default; }
  .typing { color:var(--muted); font-style:italic; font-size:13px; }
</style>
</head>
<body>
  <header>
    <h1>TCS Financial Assistant</h1>
    <p>Ask about TCS's Q4 FY26 / FY26 financials, from the annual report, fact sheet, and data sheet.</p>
  </header>
  <div id="chat"></div>
  <div id="inputbar">
    <form id="inputform">
      <input id="q" type="text" placeholder="e.g. What was TCS's Q4 FY26 revenue?" autocomplete="off" />
      <button type="submit" id="send">Ask</button>
    </form>
  </div>

<script>
const chatEl = document.getElementById('chat');
const form = document.getElementById('inputform');
const input = document.getElementById('q');
const sendBtn = document.getElementById('send');

function addMsg(role, html) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  wrap.innerHTML = `<div class="bubble">${html}</div>`;
  chatEl.appendChild(wrap);
  chatEl.scrollTop = chatEl.scrollHeight;
  return wrap;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (!question) return;
  addMsg('user', escapeHtml(question));
  input.value = '';
  sendBtn.disabled = true;

  const thinking = addMsg('bot', '<span class="typing">thinking…</span>');

  try {
    const res = await fetch('/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question})
    });
    const data = await res.json();

    let html = escapeHtml(data.answer);
    let metaBits = [];
    if (data.cache_hit) metaBits.push('⚡ cached');
    if (data.model) metaBits.push(`${data.model} (${data.tier})`);
    if (data.fell_back) metaBits.push('fallback used');
    metaBits.push(`${data.latency_seconds}s`);

    let sourcesHtml = '';
    if (data.sources && data.sources.length) {
      sourcesHtml = `<div class="sources">Sources:<ul>${data.sources.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ul></div>`;
    }

    thinking.className = 'msg bot' + (data.blocked ? ' blocked' : '');
    thinking.innerHTML = `<div class="bubble">${html}${sourcesHtml}<div class="meta">${metaBits.join(' · ')}</div></div>`;
  } catch (err) {
    thinking.innerHTML = `<div class="bubble">Error reaching the server: ${escapeHtml(String(err))}</div>`;
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
});

function escapeHtml(s) {
  const d = document.createElement('div');
  d.innerText = s;
  return d.innerHTML;
}
</script>
</body>
</html>
