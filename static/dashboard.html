<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Analytics Dashboard</title>
<style>
  :root { --bg:#0f1115; --panel:#1a1d24; --accent:#4f8cff; --good:#3ecf8e; --warn:#e8b339; --text:#e8e9ec; --muted:#8b909c; --border:#2a2e38; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); padding:28px; }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:24px; }
  .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:14px; margin-bottom:28px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px 18px; }
  .card .label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; }
  .card .value { font-size:26px; font-weight:600; margin-top:6px; }
  .card .sub2 { font-size:12px; color:var(--muted); margin-top:4px; }
  section { margin-bottom:32px; }
  section h2 { font-size:15px; margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:8px; }
  table { width:100%; border-collapse:collapse; font-size:13.5px; }
  th, td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--border); }
  th { color:var(--muted); font-weight:500; font-size:12px; text-transform:uppercase; }
  .best { color:var(--good); font-weight:600; }
  .barwrap { display:flex; align-items:center; gap:10px; margin:6px 0; }
  .barlabel { width:170px; font-size:13px; color:var(--muted); flex-shrink:0; }
  .bar { height:18px; background:var(--accent); border-radius:4px; }
  .bar.miss { background:var(--warn); }
  .barval { font-size:12.5px; color:var(--muted); margin-left:8px; }
  .refresh { float:right; background:var(--panel); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:8px; cursor:pointer; font-size:13px; }
  .note { font-size:12.5px; color:var(--muted); }
</style>
</head>
<body>
  <button class="refresh" onclick="loadAll()">Refresh</button>
  <h1>RAG Analytics Dashboard</h1>
  <div class="sub">Live server stats and retrieval evaluation metrics for the TCS Financial RAG system.</div>

  <section>
    <h2>Live request stats (since server start)</h2>
    <div class="grid" id="live-cards"></div>
  </section>

  <section>
    <h2>Latency: cache hit vs cache miss</h2>
    <div id="latency-bars"></div>
    <div class="note" id="latency-note"></div>
  </section>

  <section>
    <h2>Query routing split</h2>
    <div id="routing-bars"></div>
  </section>

  <section>
    <h2>Retrieval quality (golden-set evaluation)</h2>
    <div id="eval-table"></div>
  </section>

<script>
async function loadAll() {
  const [live, evalData] = await Promise.all([
    fetch('/analytics/live').then(r => r.json()),
    fetch('/analytics/eval').then(r => r.json()),
  ]);
  renderLive(live);
  renderLatency(live);
  renderRouting(live);
  renderEval(evalData);
}

function card(label, value, sub) {
  return `<div class="card"><div class="label">${label}</div><div class="value">${value}</div>${sub ? `<div class="sub2">${sub}</div>` : ''}</div>`;
}

function renderLive(d) {
  const hitRate = d.cache_hit_rate !== null ? (d.cache_hit_rate * 100).toFixed(1) + '%' : '—';
  document.getElementById('live-cards').innerHTML = [
    card('Total requests', d.total_requests),
    card('Cache hit rate', hitRate, `${d.cache_hits} of ${d.total_requests} hits`),
    card('Blocked (input)', d.blocked_input, 'off-topic / injection'),
    card('Blocked (output)', d.blocked_output, 'failed groundedness check'),
    card('Fallback used', d.fell_back, 'primary model failed'),
  ].join('');
}

function renderLatency(d) {
  const hit = d.avg_latency_cache_hit;
  const miss = d.avg_latency_cache_miss;
  const maxVal = Math.max(hit || 0, miss || 0, 0.1);
  const bar = (label, val, cls) => {
    if (val === null) return `<div class="barwrap"><div class="barlabel">${label}</div><span class="note">no data yet</span></div>`;
    const width = Math.max((val / maxVal) * 300, 4);
    return `<div class="barwrap"><div class="barlabel">${label}</div><div class="bar ${cls}" style="width:${width}px"></div><span class="barval">${val}s</span></div>`;
  };
  document.getElementById('latency-bars').innerHTML =
    bar('Cache HIT (avg)', hit, '') + bar('Cache MISS (avg)', miss, 'miss');
  if (hit !== null && miss !== null && hit > 0) {
    const speedup = (miss / hit).toFixed(1);
    document.getElementById('latency-note').innerText = `Cache hits are ~${speedup}x faster than a full pipeline run.`;
  }
}

function renderRouting(d) {
  const total = d.tier_simple + d.tier_complex;
  const maxVal = Math.max(d.tier_simple, d.tier_complex, 1);
  const bar = (label, val) => {
    const width = Math.max((val / maxVal) * 300, 4);
    return `<div class="barwrap"><div class="barlabel">${label}</div><div class="bar" style="width:${width}px"></div><span class="barval">${val}</span></div>`;
  };
  document.getElementById('routing-bars').innerHTML =
    bar('Simple (gpt-4o-mini)', d.tier_simple) + bar('Complex (gpt-4o)', d.tier_complex);
}

function renderEval(d) {
  const el = document.getElementById('eval-table');
  if (!d.available) {
    el.innerHTML = `<div class="note">${d.message}</div>`;
    return;
  }
  const rows = Object.entries(d.metrics);
  const bestOf = (key) => Math.max(...rows.map(([_, m]) => m[key]));
  const b1 = bestOf('hit@1'), b3 = bestOf('hit@3'), b5 = bestOf('hit@5'), bm = bestOf('mrr');
  const cell = (val, best) => `<td class="${val === best ? 'best' : ''}">${val.toFixed(2)}</td>`;
  el.innerHTML = `
    <table>
      <thead><tr><th>Config</th><th>Hit@1</th><th>Hit@3</th><th>Hit@5</th><th>MRR</th></tr></thead>
      <tbody>
        ${rows.map(([name, m]) => `<tr><td>${name}</td>${cell(m['hit@1'], b1)}${cell(m['hit@3'], b3)}${cell(m['hit@5'], b5)}${cell(m['mrr'], bm)}</tr>`).join('')}
      </tbody>
    </table>
    <div class="note" style="margin-top:8px">Based on ${d.n_questions} golden-set questions. Green = best config per column.</div>
  `;
}

loadAll();
setInterval(loadAll, 10000);
</script>
</body>
</html>
